name: Windows CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  windows-msvc:
    name: Windows MSVC 2022
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          git clone https://github.com/google/googletest.git -b v1.15.2 --depth 1
          cmake -B gtest_build -S googletest
          cmake --build gtest_build -j
          cmake --install gtest_build --prefix /usr/local

      - name: Configure
        shell: bash
        run: |
          cmake -B build \
            -G "Visual Studio 17 2022" \
            -A x64 \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DKMCMAKE_BUILD_TEST=ON \
            -DKMCMAKE_BUILD_EXAMPLES=ON

      - name: Build
        shell: bash
        run: cmake --build build --config ${{ matrix.build_type }} -j

      - name: Test
        shell: bash
        run: ctest --test-dir build --output-on-failure -C ${{ matrix.build_type }}
